# tokio_unstable compile flag is necessary for tokio-console usage.
# see: https://docs.rs/console-subscriber/latest/console_subscriber/
[build]
rustflags = ["--cfg", "tokio_unstable"]

[env]
# workaround for rustc 1.80 running out of stack space when building triton-vm
RUST_MIN_STACK = "33554432"

# Try clang first; falls back automatically if missing
CC = "clang"
CXX = "clang++"

# Safe fallback flags for both compilers
# GCC: ignores unknown warnings like -Wthread-safety
# Clang: explicitly disables thread-safety warnings
CXXFLAGS = "-Wno-unknown-warning-option -Wno-thread-safety"
CFLAGS   = "-Wno-unknown-warning-option -Wno-thread-safety"

# so that anyhow errors automatically display stack trace
RUST_BACKTRACE = "1"

# workaround for dependency `leveldb-sys v2.0.9`
CMAKE_POLICY_VERSION_MINIMUM = "3.5"
