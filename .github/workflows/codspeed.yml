name: CodSpeed

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        benchmark: [wallet_state]
        mode: [simulation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      # CodSpeed-specific caching
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # We use a distinct key because CodSpeed builds
          # are instrumented differently than standard builds
          prefix-key: "v1-codspeed"

      - name: Build benchmarks
        run: cargo codspeed build --bench ${{ matrix.benchmark }}

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: ${{ matrix.mode }}
          run: cargo codspeed run
