on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

name: Rust

jobs:
  # Job 1: Lint & Format (Fast, Linux only)
  fmt-clippy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # This key is the "Common Ground" for all jobs in this file
          shared-key: "workflow-cache"

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build Docs
        run: cargo doc --no-deps --workspace --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  # Job 2: Multi-OS Tests & Builds
  tests:
    needs: fmt-clippy-docs # don't waste OS minutes if linting fails
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "workflow-cache"
          prefix-key: "v2-test-${{ matrix.os }}"

      - name: Check Benches
        run: cargo check --benches

      - name: Run tests without benches
        run: >
          cargo nextest run
          -E 'not (
            test(mine_20_blocks_in_40_seconds) |
            test(hash_rate_independent_of_tx_size) |
            test(blocks_with_0_to_10_inputs_and_successors_are_valid) |
            test(can_cancel_preprocess_within_one_second) |
            test(can_cancel_merkle_tree_construction_within_two_seconds) |
            test(alice_updates_mutator_set_data_on_own_transaction) |
            test(can_sync_from) |
            test(can_sync_with_moving) |
            test(verify_all_proof_servers_work)
          )'

      - name: Tests without debug assertions
        run: >
          cargo nextest run --release
          -E '
             test(panic_on_out_of_bounds_get)
          or test(panic_on_out_of_bounds_get_many)
          or test(panic_on_out_of_bounds_set)
          or test(panic_on_out_of_bounds_set_many)
          or test(panic_on_size_mismatch_set_all)
          or test(panic_on_out_of_bounds_get_even_though_value_exists_in_persistent_memory)
          or test(panic_on_out_of_bounds_set_even_though_value_exists_in_persistent_memory)
          or test(out_of_bounds_using_set_many)
          or test(out_of_bounds_using_get_many)
          or test(out_of_bounds_using_get)
          or test(panic_on_out_of_bounds_get_and_set)'

      - name: Run Ignored Tests
        run: >
          cargo nextest run
          --run-ignored all
          --test-threads=1
          -E 'test(can_resume_block_download_from_saved_incomplete_state) or test(can_resume_block_download_from_saved_overcomplete_state) or test(can_resume_sync_from_saved_state)'

      # `--doc` cannot be mixed with other target option
      - name: Run documentation tests
        run: cargo test --doc
